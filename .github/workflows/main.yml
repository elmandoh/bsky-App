name: Bluesky US Marketing Bot

on:
  schedule:
    - cron: '0 * * * *' # يشتغل كل ساعة
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install groq atproto

      - name: Execute Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GLOBALPULSE24: ${{ secrets.GLOBALPULSE24 }}
          K3LIVE: ${{ secrets.K3LIVE }}
          EUROTRENDS24: ${{ secrets.EUROTRENDS24 }}
        run: python bot.py

      - name: Commit and push history
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add posted_history.txt
          git commit -m "Update posting history [skip ci]" || echo "No changes"
          git push || echo "Push failed"
